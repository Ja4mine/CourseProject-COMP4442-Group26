spring:
  application:
    name: core-service

  datasource:
    url: jdbc:postgresql://localhost:5432/moodwall
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: true

logging:
  level:
    com.polyu.moodwall: DEBUG
    org.springframework.web.socket: INFO

moodwall:
  rate-limit:
    posts-per-hour: 10
  anonymous-id:
    hash-salt: ${ANONYMOUS_SALT:default-salt-change-in-prod}
  websocket:
    endpoint: /ws
    allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true