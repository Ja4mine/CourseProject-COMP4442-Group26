spring:
  application:
    name: mood-wall

  datasource:
    url: jdbc:postgresql://localhost:5432/moodwall
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8

  ai:
    bedrock:
      aws:
        access-key: ${AWS_ACCESS_KEY_ID}
        secret-key: ${AWS_SECRET_ACCESS_KEY}
        region: us-east-1
      chat:
        options:
          anthropic.claude-3-5-sonnet-20241022:
            temperature: 0.7
            max-tokens: 1000

server:
  port: 8080

logging:
  level:
    com.polyu.moodwall: DEBUG
    org.springframework.web.socket: INFO

moodwall:
  rate-limit:
    posts-per-hour: 10
  anonymous-id:
    hash-salt: ${ANONYMOUS_SALT:default-salt-change-in-prod}
  websocket:
    endpoint: /ws
    allowed-origins: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true